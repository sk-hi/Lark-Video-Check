<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>テストウェビナーチェック</title>
    <style>
        body, html { 
            background-color: #000; 
            margin: 0; padding: 0; 
            width: 100%; height: 100%; 
            overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
        }
        #player-container {
            width: 95vw;
            max-width: 1200px;
            aspect-ratio: 16 / 9;
        }
        #player { width: 100%; height: 100%; border: none; }
    </style>
</head>
<body>
    <div id="player-container">
        <div id="player"></div>
    </div>

    <script>
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        const videoId = 'RYSlVq7I3sg'; 
        const webhookUrl = 'https://hook.eu1.make.com/4bygxekn2j89hd3o0nfxby1o9moc4slm';

        const urlParams = new URLSearchParams(window.location.search);
        const userName = urlParams.get('user') || '不明なユーザー';

        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: videoId,
                playerVars: { 'rel': 0, 'modestbranding': 1, 'playsinline': 0 },
                events: { 'onStateChange': onPlayerStateChange }
            });
        }

        function onPlayerStateChange(event) {
            // 動画が再生開始（PLAYING）されたら全画面にする
            if (event.data == YT.PlayerState.PLAYING) {
                const iframe = document.getElementById('player');
                if (iframe.requestFullscreen) {
                    iframe.requestFullscreen();
                } else if (iframe.webkitRequestFullscreen) { /* Safari用 */
                    iframe.webkitRequestFullscreen();
                } else if (iframe.msRequestFullscreen) { /* IE11用 */
                    iframe.msRequestFullscreen();
                }
            }

            // 動画が終了（ENDED）したら全画面を解除してデータを送る
            if (event.data == YT.PlayerState.ENDED) {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                }

                fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user: userName, event: 'completed' })
                })
                .then(() => alert('視聴完了しました！データを記録しました。'))
                .catch(() => alert('通信エラーが発生しました。'));
            }
        }
    </script>
</body>
</html>

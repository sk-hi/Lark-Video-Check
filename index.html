<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>動画視聴チェック</title>
    <style>
        body { background-color: #1a1a1a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        #player { width: 100%; max-width: 800px; aspect-ratio: 16 / 9; }
    </style>
</head>
<body>
    <div id="player"></div>
    <script>
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        // ★ここを自分の設定に書き換えてください！
        const videoId = 'ywDBPOyPXfw'; 
        const webhookUrl = 'https://hook.eu1.make.com/4bygxekn2j89hd3o0nfxby1o9moc4slm';

        // URLから user=名前 を取得する設定
        const urlParams = new URLSearchParams(window.location.search);
        const userName = urlParams.get('user') || '不明なユーザー';

        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: videoId,
                events: { 'onStateChange': onPlayerStateChange }
            });
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.ENDED) {
                fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user: userName, event: 'completed' })
                })
                .then(() => alert('視聴完了しました！データを記録しました。'))
                .catch(() => alert('通信エラーが発生しました。'));
            }
        }
    </script>
</body>
</html>

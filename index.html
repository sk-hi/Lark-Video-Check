<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>動画視聴チェック</title>
    <style>
        body, html { 
            background-color: #000; margin: 0; padding: 0; 
            width: 100%; height: 100%; overflow: hidden; 
            display: flex; justify-content: center; align-items: center; 
        }
        #player-container {
            position: relative;
            width: 95vw; max-width: 1200px; aspect-ratio: 16 / 9;
        }
        #player { width: 100%; height: 100%; border: none; }
        
        /* 透明な再生ボタン（動画の上に被せる） */
        #play-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.1); /* ほんの少し暗くする */
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; z-index: 10;
        }
        #play-button {
            width: 80px; height: 80px; background: red; border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            color: white; font-size: 40px; box-shadow: 0 0 20px rgba(255,0,0,0.5);
        }
    </style>
</head>
<body>
    <div id="player-container" id="fullscreen-target">
        <div id="player"></div>
        <div id="play-overlay" onclick="startVideoAndFullscreen()">
            <div id="play-button">▶</div>
        </div>
    </div>

    <script>
        const tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        const firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        const videoId = 'RYSlVq7I3sg'; 
        const webhookUrl = 'https://hook.eu1.make.com/4bygxekn2j89hd3o0nfxby1o9moc4slm';

        const urlParams = new URLSearchParams(window.location.search);
        const userName = urlParams.get('user') || '不明なユーザー';

        let player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: videoId,
                playerVars: { 'rel': 0, 'modestbranding': 1, 'playsinline': 1 },
                events: { 'onStateChange': onPlayerStateChange }
            });
        }

        // ★ボタンを押した瞬間に「全画面」と「再生」を同時に実行
        function startVideoAndFullscreen() {
            const container = document.getElementById('player-container');
            const overlay = document.getElementById('play-overlay');

            // 全画面リクエスト
            if (container.requestFullscreen) {
                container.requestFullscreen();
            } else if (container.webkitRequestFullscreen) {
                container.webkitRequestFullscreen();
            }

            // 動画再生開始
            player.playVideo();
            
            // ボタンを消す
            overlay.style.display = 'none';
        }

        function onPlayerStateChange(event) {
            if (event.data == YT.PlayerState.ENDED) {
                // 終了したら全画面解除
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                }

                fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user: userName, event: 'completed' })
                })
                .then(() => alert('視聴完了しました！データを記録しました。'))
                .catch(() => alert('通信エラーが発生しました。'));
            }
        }
    </script>
</body>
</html>
